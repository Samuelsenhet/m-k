# Runs on push to main when mobile or shared @maak/core changes (monorepo paths from repo root).
# Link GitHub to the Expo project first: https://expo.dev → Project → GitHub.
# Skip a run: include [eas skip], [skip eas], or [no eas] in the commit message.
name: Production build on main (iOS only)

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "packages/core/**"

jobs:
  build_ios:
    type: build
    params:
      platform: ios
      profile: expo-production
