name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          # Pinned after `latest` rolled and broke `db push` 2026-04-14.
          # Bump deliberately when we want a newer CLI.
          version: 2.52.0

      - name: Print CLI version
        run: supabase --version

      - name: Require production Supabase project ref
        run: |
          if [ -z "${{ secrets.PRODUCTION_PROJECT_ID }}" ]; then
            echo "::error::PRODUCTION_PROJECT_ID secret is missing. Add it in GitHub → Settings → Secrets → Actions (Supabase project ref from Dashboard → Project Settings → General)."
            exit 1
          fi

      - name: Link to Production Project
        # -p explicit to cover CLI versions that don't read SUPABASE_DB_PASSWORD
        # env var for the link command (observed failing at 0.0s on 2.40.7).
        run: supabase link --project-ref "${{ secrets.PRODUCTION_PROJECT_ID }}" -p "$SUPABASE_DB_PASSWORD"

      - name: Push Migrations to Production
        run: supabase db push -p "$SUPABASE_DB_PASSWORD" --yes

      - name: Deploy Edge Functions to Production
        run: supabase functions deploy
