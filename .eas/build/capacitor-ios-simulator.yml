# EAS custom build for Capacitor iOS Simulator only (no credentials).
# Same as capacitor-ios.yml but skips configure_ios_credentials and uses a
# Gymfile that builds for generic iOS Simulator (no keychain/provisioning).
build:
  name: Capacitor iOS Simulator
  steps:
    - eas/checkout
    - eas/use_npm_token
    - run:
        name: Use Node 22 (Capacitor CLI requirement)
        command: |
          export NVM_DIR="$HOME/.nvm"
          if [ ! -s "$NVM_DIR/nvm.sh" ]; then
            curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          else
            . "$NVM_DIR/nvm.sh"
          fi
          nvm install 22
          nvm use 22
          nvm alias default 22
          node -v
          npm -v
    - run:
        name: Install production dependencies only
        command: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" && nvm use 22
          export SHARP_IGNORE_GLOBAL_LIBVIPS=1
          npm ci --omit=dev
    - run:
        name: Remove Expo/React Native so iOS links only Capacitor
        command: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" && nvm use 22
          rm -rf node_modules/expo node_modules/react-native node_modules/@react-native node_modules/expo-* node_modules/@expo 2>/dev/null || true
          npm prune
    - run:
        name: Ensure shared App scheme exists (required for EAS and Fastlane)
        command: |
          SCHEME_DIR="ios/App/App.xcodeproj/xcshareddata/xcschemes"
          mkdir -p "$SCHEME_DIR"
          PBX="ios/App/App.xcodeproj/project.pbxproj"
          BLUEPRINT=$(awk '/\/\* App \*\/ = \{/ {id=$1; getline; if(/isa = PBXNativeTarget/) {print id; exit}}' "$PBX")
          if [ -z "$BLUEPRINT" ]; then
            echo "Could not find App target in $PBX"
            exit 1
          fi
          echo "Using BlueprintIdentifier: $BLUEPRINT"
          cat > "$SCHEME_DIR/App.xcscheme" << SCHEMEEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <Scheme
             LastUpgradeVersion = "1500"
             version = "1.7">
             <BuildAction
                parallelizeBuildables = "YES"
                buildImplicitDependencies = "YES">
                <BuildActionEntries>
                   <BuildActionEntry
                      buildForTesting = "YES"
                      buildForRunning = "YES"
                      buildForProfiling = "YES"
                      buildForArchiving = "YES"
                      buildForAnalyzing = "YES">
                      <BuildableReference
                         BuildableIdentifier = "primary"
                         BlueprintIdentifier = "$BLUEPRINT"
                         BuildableName = "App.app"
                         BlueprintName = "App"
                         ReferencedContainer = "container:App.xcodeproj">
                      </BuildableReference>
                   </BuildActionEntry>
                </BuildActionEntries>
             </BuildAction>
             <TestAction
                buildConfiguration = "Debug"
                selectedDebuggerIdentifier = "Xcode.DebuggerFoundation.Debugger.LLDB"
                selectedLauncherIdentifier = "Xcode.DebuggerFoundation.Launcher.LLDB"
                shouldUseLaunchSchemeArgsEnv = "YES"
                shouldAutocreateTestPlan = "YES">
             </TestAction>
             <LaunchAction
                buildConfiguration = "Debug"
                selectedDebuggerIdentifier = "Xcode.DebuggerFoundation.Debugger.LLDB"
                selectedLauncherIdentifier = "Xcode.DebuggerFoundation.Launcher.LLDB"
                launchStyle = "0"
                useCustomWorkingDirectory = "NO"
                ignoresPersistentStateOnLaunch = "NO"
                debugDocumentVersioning = "YES"
                debugServiceExtension = "internal"
                allowLocationSimulation = "YES">
                <BuildableProductRunnable
                   runnableDebuggingMode = "0">
                   <BuildableReference
                      BuildableIdentifier = "primary"
                      BlueprintIdentifier = "$BLUEPRINT"
                      BuildableName = "App.app"
                      BlueprintName = "App"
                      ReferencedContainer = "container:App.xcodeproj">
                   </BuildableReference>
                </BuildableProductRunnable>
             </LaunchAction>
             <ProfileAction
                buildConfiguration = "Release"
                shouldUseLaunchSchemeArgsEnv = "YES"
                savedToolIdentifier = ""
                useCustomWorkingDirectory = "NO"
                debugDocumentVersioning = "YES">
                <BuildableProductRunnable
                   runnableDebuggingMode = "0">
                   <BuildableReference
                      BuildableIdentifier = "primary"
                      BlueprintIdentifier = "$BLUEPRINT"
                      BuildableName = "App.app"
                      BlueprintName = "App"
                      ReferencedContainer = "container:App.xcodeproj">
                   </BuildableReference>
                </BuildableProductRunnable>
             </ProfileAction>
             <AnalyzeAction
                buildConfiguration = "Debug">
             </AnalyzeAction>
             <ArchiveAction
                buildConfiguration = "Release"
                revealArchiveInOrganizer = "YES">
             </ArchiveAction>
          </Scheme>
          SCHEMEEOF
          echo "Created $SCHEME_DIR/App.xcscheme"
    - eas/resolve_build_config
    - run:
        name: Ensure no Expo/RN before cap sync (second pass)
        command: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" && nvm use 22
          rm -rf node_modules/expo node_modules/react-native node_modules/@react-native node_modules/expo-* node_modules/@expo 2>/dev/null || true
          npm prune 2>/dev/null || true
    - run:
        name: Build web and sync to iOS
        command: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" && nvm use 22
          npm run build
          if [ ! -d ios/App ] || [ ! -f ios/App/App.xcodeproj/project.pbxproj ]; then
            npx cap add ios
          fi
          npx cap sync ios
    - run:
        name: Ensure shared App scheme exists (required for xcodebuild/Fastlane)
        command: |
          SCHEME_DIR="ios/App/App.xcodeproj/xcshareddata/xcschemes"
          mkdir -p "$SCHEME_DIR"
          PBX="ios/App/App.xcodeproj/project.pbxproj"
          BLUEPRINT=$(awk '/\/\* App \*\/ = \{/ {id=$1; getline; if(/isa = PBXNativeTarget/) {print id; exit}}' "$PBX")
          if [ -z "$BLUEPRINT" ]; then
            echo "Could not find App target in $PBX"
            exit 1
          fi
          echo "Using BlueprintIdentifier: $BLUEPRINT"
          cat > "$SCHEME_DIR/App.xcscheme" << SCHEMEEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <Scheme
             LastUpgradeVersion = "1500"
             version = "1.7">
             <BuildAction
                parallelizeBuildables = "YES"
                buildImplicitDependencies = "YES">
                <BuildActionEntries>
                   <BuildActionEntry
                      buildForTesting = "YES"
                      buildForRunning = "YES"
                      buildForProfiling = "YES"
                      buildForArchiving = "YES"
                      buildForAnalyzing = "YES">
                      <BuildableReference
                         BuildableIdentifier = "primary"
                         BlueprintIdentifier = "$BLUEPRINT"
                         BuildableName = "App.app"
                         BlueprintName = "App"
                         ReferencedContainer = "container:App.xcodeproj">
                      </BuildableReference>
                   </BuildActionEntry>
                </BuildActionEntries>
             </BuildAction>
             <TestAction
                buildConfiguration = "Debug"
                selectedDebuggerIdentifier = "Xcode.DebuggerFoundation.Debugger.LLDB"
                selectedLauncherIdentifier = "Xcode.DebuggerFoundation.Launcher.LLDB"
                shouldUseLaunchSchemeArgsEnv = "YES"
                shouldAutocreateTestPlan = "YES">
             </TestAction>
             <LaunchAction
                buildConfiguration = "Debug"
                selectedDebuggerIdentifier = "Xcode.DebuggerFoundation.Debugger.LLDB"
                selectedLauncherIdentifier = "Xcode.DebuggerFoundation.Launcher.LLDB"
                launchStyle = "0"
                useCustomWorkingDirectory = "NO"
                ignoresPersistentStateOnLaunch = "NO"
                debugDocumentVersioning = "YES"
                debugServiceExtension = "internal"
                allowLocationSimulation = "YES">
                <BuildableProductRunnable
                   runnableDebuggingMode = "0">
                   <BuildableReference
                      BuildableIdentifier = "primary"
                      BlueprintIdentifier = "$BLUEPRINT"
                      BuildableName = "App.app"
                      BlueprintName = "App"
                      ReferencedContainer = "container:App.xcodeproj">
                   </BuildableReference>
                </BuildableProductRunnable>
             </LaunchAction>
             <ProfileAction
                buildConfiguration = "Release"
                shouldUseLaunchSchemeArgsEnv = "YES"
                savedToolIdentifier = ""
                useCustomWorkingDirectory = "NO"
                debugDocumentVersioning = "YES">
                <BuildableProductRunnable
                   runnableDebuggingMode = "0">
                   <BuildableReference
                      BuildableIdentifier = "primary"
                      BlueprintIdentifier = "$BLUEPRINT"
                      BuildableName = "App.app"
                      BlueprintName = "App"
                      ReferencedContainer = "container:App.xcodeproj">
                   </BuildableReference>
                </BuildableProductRunnable>
             </ProfileAction>
             <AnalyzeAction
                buildConfiguration = "Debug">
             </AnalyzeAction>
             <ArchiveAction
                buildConfiguration = "Release"
                revealArchiveInOrganizer = "YES">
             </ArchiveAction>
          </Scheme>
          SCHEMEEOF
          echo "Created $SCHEME_DIR/App.xcscheme"
    - run:
        name: Remove Expo/RN again before pod install (third pass)
        command: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" && nvm use 22
          rm -rf node_modules/expo node_modules/react-native node_modules/@react-native node_modules/expo-* node_modules/@expo 2>/dev/null || true
          npm prune 2>/dev/null || true
    - run:
        name: Fix Podfile for Capacitor static library (modular headers) or skip if SPM
        working_directory: ios/App
        command: |
          if [ -f Podfile ]; then
            if ! grep -q "use_modular_headers" Podfile; then
              echo "use_modular_headers!" | cat - Podfile > Podfile.tmp && mv Podfile.tmp Podfile
            fi
            pod install
          else
            echo "No Podfile (Capacitor may use Swift Package Manager); skipping pod install"
          fi
    # No eas/configure_ios_credentials — simulator build does not need keychain or provisioning
    # Skip eas/configure_ios_version (it reads credential data and fails with "Cannot read properties of undefined (reading 'data')" when withoutCredentials)
    - run:
        name: Set iOS version (simulator; no credentials)
        command: |
          echo "Using existing version from ios/App/App.xcodeproj (no credential step)."
    - run:
        name: Generate Gymfile for iOS Simulator (no credentials)
        working_directory: ios
        command: |
          mkdir -p build/logs
          cat > Gymfile << 'GYMFILE'
          suppress_xcode_output(true)
          project("App/App.xcodeproj")
          clean(true)
          scheme("App")
          skip_package_ipa(true)
          destination("generic/platform=iOS Simulator")
          output_directory("build")
          buildlog_path("build/logs")
          disable_xcpretty(true)
          GYMFILE
          echo "Wrote Gymfile for simulator build"
    # Use xcodebuild directly to avoid eas/run_fastlane (which reads buildCredentials and fails when withoutCredentials)
    - run:
        name: Build for iOS Simulator (xcodebuild)
        working_directory: ios
        command: |
          xcodebuild -project App/App.xcodeproj -scheme App \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            build
          # EAS find_and_upload_build_artifacts looks for ios/build/Build/Products/*simulator/*.app
          APP_OUT=build/DerivedData/Build/Products/Release-iphonesimulator/App.app
          [ ! -d "$APP_OUT" ] && APP_OUT=build/DerivedData/Build/Products/Debug-iphonesimulator/App.app
          mkdir -p build/Build/Products/Release-iphonesimulator
          cp -r "$APP_OUT" build/Build/Products/Release-iphonesimulator/App.app
          echo "App placed at build/Build/Products/Release-iphonesimulator/App.app for EAS artifact upload"
    - eas/find_and_upload_build_artifacts
