# EAS custom build for Capacitor iOS (no expo prebuild).
# Builds Vite app, syncs to ios/ with cap sync, then builds with Fastlane.
# Capacitor project lives at ios/App/App.xcodeproj, scheme "App".
build:
  name: Capacitor iOS
  steps:
    - eas/checkout
    - eas/use_npm_token
    - eas/install_node_modules
    - run:
        name: Remove Expo/React Native so iOS links only Capacitor
        command: |
          rm -rf node_modules/expo node_modules/react-native node_modules/@react-native node_modules/expo-* node_modules/@expo 2>/dev/null || true
          npm prune
    - eas/resolve_build_config
    - run:
        name: Ensure no Expo/RN before cap sync (second pass)
        command: |
          rm -rf node_modules/expo node_modules/react-native node_modules/@react-native node_modules/expo-* node_modules/@expo 2>/dev/null || true
          npm prune 2>/dev/null || true
    - run:
        name: Build web and sync to iOS
        command: npm run ios:build
    - run:
        name: Remove Expo/RN again before pod install (third pass)
        command: |
          rm -rf node_modules/expo node_modules/react-native node_modules/@react-native node_modules/expo-* node_modules/@expo 2>/dev/null || true
          npm prune 2>/dev/null || true
    - run:
        name: Fix Podfile for Capacitor static library (modular headers)
        working_directory: ios/App
        command: |
          if [ -f Podfile ] && ! grep -q "use_modular_headers" Podfile; then
            echo "use_modular_headers!" | cat - Podfile > Podfile.tmp && mv Podfile.tmp Podfile
          fi
          pod install
    - eas/configure_ios_credentials
    - eas/configure_ios_version
    - eas/generate_gymfile_from_template:
        inputs:
          credentials: ${ eas.job.secrets.buildCredentials }
          extra:
            SCHEME: App
          template: |
            suppress_xcode_output(true)
            project("App/App.xcodeproj")
            clean(<%- CLEAN %>)
            scheme("<%- SCHEME %>")
            <% if (BUILD_CONFIGURATION) { %>
            configuration("<%- BUILD_CONFIGURATION %>")
            <% } %>
            export_options({
            method: "<%- EXPORT_METHOD %>",
            provisioningProfiles: {<% _.forEach(PROFILES, function(profile) { %>
              "<%- profile.BUNDLE_ID %>" => "<%- profile.UUID %>",<% }); %>
            }<% if (ICLOUD_CONTAINER_ENVIRONMENT) { %>,
            iCloudContainerEnvironment: "<%- ICLOUD_CONTAINER_ENVIRONMENT %>"
            <% } %>
            })
            export_xcargs "OTHER_CODE_SIGN_FLAGS=\"--keychain <%- KEYCHAIN_PATH %>\""
            disable_xcpretty(true)
            buildlog_path("<%- LOGS_DIRECTORY %>")
            output_directory("<%- OUTPUT_DIRECTORY %>")
    - eas/run_fastlane
    - eas/find_and_upload_build_artifacts
