# EAS custom build for Capacitor iOS (no expo prebuild).
# Builds Vite app, syncs to ios/ with cap sync, then builds with Fastlane.
# Capacitor project lives at ios/App/App.xcodeproj, scheme "App".
# Node 22 is required by Capacitor CLI; EAS default image may use Node 20.
build:
  name: Capacitor iOS
  steps:
    - eas/checkout
    - eas/use_npm_token
    - run:
        name: Use Node 22 (Capacitor CLI requirement)
        command: |
          export NVM_DIR="$HOME/.nvm"
          if [ ! -s "$NVM_DIR/nvm.sh" ]; then
            curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          else
            . "$NVM_DIR/nvm.sh"
          fi
          nvm install 22
          nvm use 22
          nvm alias default 22
          node -v
          npm -v
    # Production deps only: avoids sharp (dev-only, mascot scripts) on EAS; SHARP_* prevents build-from-source if ever used
    - run:
        name: Install production dependencies only
        command: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" && nvm use 22
          export SHARP_IGNORE_GLOBAL_LIBVIPS=1
          npm ci --omit=dev
    - run:
        name: Remove Expo/React Native so iOS links only Capacitor
        command: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" && nvm use 22
          rm -rf node_modules/expo node_modules/react-native node_modules/@react-native node_modules/expo-* node_modules/@expo 2>/dev/null || true
          npm prune
    # Create shared App scheme before resolve_build_config so EAS can find it (project.pbxproj exists after checkout)
    - run:
        name: Ensure shared App scheme exists (required for EAS and Fastlane)
        command: |
          SCHEME_DIR="ios/App/App.xcodeproj/xcshareddata/xcschemes"
          mkdir -p "$SCHEME_DIR"
          PBX="ios/App/App.xcodeproj/project.pbxproj"
          # Extract App target BlueprintIdentifier (PBXNativeTarget "App" block only, not the App group)
          BLUEPRINT=$(awk '/\/\* App \*\/ = \{/ {id=$1; getline; if(/isa = PBXNativeTarget/) {print id; exit}}' "$PBX")
          if [ -z "$BLUEPRINT" ]; then
            echo "Could not find App target in $PBX"
            exit 1
          fi
          echo "Using BlueprintIdentifier: $BLUEPRINT"
          cat > "$SCHEME_DIR/App.xcscheme" << SCHEMEEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <Scheme
             LastUpgradeVersion = "1500"
             version = "1.7">
             <BuildAction
                parallelizeBuildables = "YES"
                buildImplicitDependencies = "YES">
                <BuildActionEntries>
                   <BuildActionEntry
                      buildForTesting = "YES"
                      buildForRunning = "YES"
                      buildForProfiling = "YES"
                      buildForArchiving = "YES"
                      buildForAnalyzing = "YES">
                      <BuildableReference
                         BuildableIdentifier = "primary"
                         BlueprintIdentifier = "$BLUEPRINT"
                         BuildableName = "App.app"
                         BlueprintName = "App"
                         ReferencedContainer = "container:App.xcodeproj">
                      </BuildableReference>
                   </BuildActionEntry>
                </BuildActionEntries>
             </BuildAction>
             <TestAction
                buildConfiguration = "Debug"
                selectedDebuggerIdentifier = "Xcode.DebuggerFoundation.Debugger.LLDB"
                selectedLauncherIdentifier = "Xcode.DebuggerFoundation.Launcher.LLDB"
                shouldUseLaunchSchemeArgsEnv = "YES"
                shouldAutocreateTestPlan = "YES">
             </TestAction>
             <LaunchAction
                buildConfiguration = "Debug"
                selectedDebuggerIdentifier = "Xcode.DebuggerFoundation.Debugger.LLDB"
                selectedLauncherIdentifier = "Xcode.DebuggerFoundation.Launcher.LLDB"
                launchStyle = "0"
                useCustomWorkingDirectory = "NO"
                ignoresPersistentStateOnLaunch = "NO"
                debugDocumentVersioning = "YES"
                debugServiceExtension = "internal"
                allowLocationSimulation = "YES">
                <BuildableProductRunnable
                   runnableDebuggingMode = "0">
                   <BuildableReference
                      BuildableIdentifier = "primary"
                      BlueprintIdentifier = "$BLUEPRINT"
                      BuildableName = "App.app"
                      BlueprintName = "App"
                      ReferencedContainer = "container:App.xcodeproj">
                   </BuildableReference>
                </BuildableProductRunnable>
             </LaunchAction>
             <ProfileAction
                buildConfiguration = "Release"
                shouldUseLaunchSchemeArgsEnv = "YES"
                savedToolIdentifier = ""
                useCustomWorkingDirectory = "NO"
                debugDocumentVersioning = "YES">
                <BuildableProductRunnable
                   runnableDebuggingMode = "0">
                   <BuildableReference
                      BuildableIdentifier = "primary"
                      BlueprintIdentifier = "$BLUEPRINT"
                      BuildableName = "App.app"
                      BlueprintName = "App"
                      ReferencedContainer = "container:App.xcodeproj">
                   </BuildableReference>
                </BuildableProductRunnable>
             </ProfileAction>
             <AnalyzeAction
                buildConfiguration = "Debug">
             </AnalyzeAction>
             <ArchiveAction
                buildConfiguration = "Release"
                revealArchiveInOrganizer = "YES">
             </ArchiveAction>
          </Scheme>
          SCHEMEEOF
          echo "Created $SCHEME_DIR/App.xcscheme"
    - eas/resolve_build_config
    - run:
        name: Ensure no Expo/RN before cap sync (second pass)
        command: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" && nvm use 22
          rm -rf node_modules/expo node_modules/react-native node_modules/@react-native node_modules/expo-* node_modules/@expo 2>/dev/null || true
          npm prune 2>/dev/null || true
    - run:
        name: Build web and sync to iOS
        command: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" && nvm use 22
          npm run build
          # Only run "cap add ios" if the native iOS project is missing (e.g. first-time). If ios/App exists (committed), skip add to avoid "ios platform already exists".
          if [ ! -d ios/App ] || [ ! -f ios/App/App.xcodeproj/project.pbxproj ]; then
            npx cap add ios
          fi
          npx cap sync ios
    - run:
        name: Ensure shared App scheme exists (required for xcodebuild/Fastlane)
        command: |
          SCHEME_DIR="ios/App/App.xcodeproj/xcshareddata/xcschemes"
          mkdir -p "$SCHEME_DIR"
          PBX="ios/App/App.xcodeproj/project.pbxproj"
          # Extract App target BlueprintIdentifier (PBXNativeTarget "App" block only, not the App group)
          BLUEPRINT=$(awk '/\/\* App \*\/ = \{/ {id=$1; getline; if(/isa = PBXNativeTarget/) {print id; exit}}' "$PBX")
          if [ -z "$BLUEPRINT" ]; then
            echo "Could not find App target in $PBX"
            exit 1
          fi
          echo "Using BlueprintIdentifier: $BLUEPRINT"
          cat > "$SCHEME_DIR/App.xcscheme" << SCHEMEEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <Scheme
             LastUpgradeVersion = "1500"
             version = "1.7">
             <BuildAction
                parallelizeBuildables = "YES"
                buildImplicitDependencies = "YES">
                <BuildActionEntries>
                   <BuildActionEntry
                      buildForTesting = "YES"
                      buildForRunning = "YES"
                      buildForProfiling = "YES"
                      buildForArchiving = "YES"
                      buildForAnalyzing = "YES">
                      <BuildableReference
                         BuildableIdentifier = "primary"
                         BlueprintIdentifier = "$BLUEPRINT"
                         BuildableName = "App.app"
                         BlueprintName = "App"
                         ReferencedContainer = "container:App.xcodeproj">
                      </BuildableReference>
                   </BuildActionEntry>
                </BuildActionEntries>
             </BuildAction>
             <TestAction
                buildConfiguration = "Debug"
                selectedDebuggerIdentifier = "Xcode.DebuggerFoundation.Debugger.LLDB"
                selectedLauncherIdentifier = "Xcode.DebuggerFoundation.Launcher.LLDB"
                shouldUseLaunchSchemeArgsEnv = "YES"
                shouldAutocreateTestPlan = "YES">
             </TestAction>
             <LaunchAction
                buildConfiguration = "Debug"
                selectedDebuggerIdentifier = "Xcode.DebuggerFoundation.Debugger.LLDB"
                selectedLauncherIdentifier = "Xcode.DebuggerFoundation.Launcher.LLDB"
                launchStyle = "0"
                useCustomWorkingDirectory = "NO"
                ignoresPersistentStateOnLaunch = "NO"
                debugDocumentVersioning = "YES"
                debugServiceExtension = "internal"
                allowLocationSimulation = "YES">
                <BuildableProductRunnable
                   runnableDebuggingMode = "0">
                   <BuildableReference
                      BuildableIdentifier = "primary"
                      BlueprintIdentifier = "$BLUEPRINT"
                      BuildableName = "App.app"
                      BlueprintName = "App"
                      ReferencedContainer = "container:App.xcodeproj">
                   </BuildableReference>
                </BuildableProductRunnable>
             </LaunchAction>
             <ProfileAction
                buildConfiguration = "Release"
                shouldUseLaunchSchemeArgsEnv = "YES"
                savedToolIdentifier = ""
                useCustomWorkingDirectory = "NO"
                debugDocumentVersioning = "YES">
                <BuildableProductRunnable
                   runnableDebuggingMode = "0">
                   <BuildableReference
                      BuildableIdentifier = "primary"
                      BlueprintIdentifier = "$BLUEPRINT"
                      BuildableName = "App.app"
                      BlueprintName = "App"
                      ReferencedContainer = "container:App.xcodeproj">
                   </BuildableReference>
                </BuildableProductRunnable>
             </ProfileAction>
             <AnalyzeAction
                buildConfiguration = "Debug">
             </AnalyzeAction>
             <ArchiveAction
                buildConfiguration = "Release"
                revealArchiveInOrganizer = "YES">
             </ArchiveAction>
          </Scheme>
          SCHEMEEOF
          echo "Created $SCHEME_DIR/App.xcscheme"
    - run:
        name: Remove Expo/RN again before pod install (third pass)
        command: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" && nvm use 22
          rm -rf node_modules/expo node_modules/react-native node_modules/@react-native node_modules/expo-* node_modules/@expo 2>/dev/null || true
          npm prune 2>/dev/null || true
    - run:
        name: Fix Podfile for Capacitor static library (modular headers) or skip if SPM
        working_directory: ios/App
        command: |
          if [ -f Podfile ]; then
            if ! grep -q "use_modular_headers" Podfile; then
              echo "use_modular_headers!" | cat - Podfile > Podfile.tmp && mv Podfile.tmp Podfile
            fi
            pod install
          else
            echo "No Podfile (Capacitor may use Swift Package Manager); skipping pod install"
          fi
    - eas/configure_ios_credentials
    - eas/configure_ios_version
    - eas/generate_gymfile_from_template:
        inputs:
          credentials: ${eas.job.secrets.buildCredentials}
          extra:
            SCHEME: App
          template: |
            suppress_xcode_output(true)
            project("ios/App/App.xcodeproj")
            clean(<%- CLEAN %>)
            scheme("<%- SCHEME %>")
            <% if (BUILD_CONFIGURATION) { %>
            configuration("<%- BUILD_CONFIGURATION %>")
            <% } %>
            export_options({
            method: "<%- EXPORT_METHOD %>",
            provisioningProfiles: {<% _.forEach(PROFILES, function(profile) { %>
              "<%- profile.BUNDLE_ID %>" => "<%- profile.UUID %>",<% }); %>
            }<% if (ICLOUD_CONTAINER_ENVIRONMENT) { %>,
            iCloudContainerEnvironment: "<%- ICLOUD_CONTAINER_ENVIRONMENT %>"
            <% } %>
            })
            export_xcargs "OTHER_CODE_SIGN_FLAGS=\"--keychain <%- KEYCHAIN_PATH %>\""
            disable_xcpretty(true)
            buildlog_path("<%- LOGS_DIRECTORY %>")
            output_directory("<%- OUTPUT_DIRECTORY %>")
    - eas/run_fastlane
    - eas/find_and_upload_build_artifacts
